<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carinho de compras</title>
</head>
<body>
    <h1>Carrinho de compras</h1>

    <button onclick="adicionarItem('Camiseta', 49.90)">Adicionar Camiseta (R$ 49,90)</button>
    <button onclick="adicionarItem('Calça', 49.90)">Adicionar Calça (R$ 89,90)</button>
    <button onclick="limparCarrinho()">Limpar o carrinho</button>
    
    <button onclick="atualizarTarefa()">Atualizar a tela</button>

    <p>Itens no carrinho: <span>0</span></p>
    <p>Total: R$ <span>0.00</span></p>

    <script src="./carrinho.js"></script>

    <script>
        function atualizarTarefa(){
            document.getElementById("qtd").textContent = contarItens()
            document.getElementById("Total").textContent = calcularTotal().toFixed(2)
        }
    </script>
</body>
</html>
