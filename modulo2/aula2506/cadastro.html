<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - Clarin Diário</title>
    <link rel="stylesheet" href="./css/main.css">
    <script src="js/components/site-header.js"></script>
    <script src="js/components/site-footer.js"></script>
    <script type="module" src="js/services/cadastro.js"></script>
</head>
<body>
    <site-header></site-header>
    <main class="auth">
        <form id="form-cadastro" class="formulario">
            <h1>Criar conta</h1>
            <label form="nome">Nome Completo</label>
            <input type="text" id="nome" required>
            <label for="cep">CEP</label>
            <input type="text" id="cep" placeholder="00000-000" required>
            <div class="linha">
                <div class="campo-largo">
                    <label for="logradouro">Rua</label>
                    <input type="text" id="logradouro">
                </div>

                 <div class="campo-curto">
                    <label for="numero">Número</label>
                    <input type="text" id="numero">
                </div>
            </div>

            <label for="bairro">Bairro</label>
            <input type="text" id="bairro">

            <div class="linha">
                <div class="campo-largo">
                    <label for="cidade">Cidade</label>
                    <input type="text" id="cidade">
                </div>

                 <div class="campo-curto">
                    <label for="uf">UF</label>
                    <input type="text" id="uf" maxlength="2">
                </div>
            </div>

            <label for="email">E-mail</label>
            <input type="email" id="email" required>

            <label for="senha">Senha</label>
            <input type="password" id="senha" required>

            <p id="aviso" class="aviso"></p>
            <button type="submit" class="btn btn--primary">Cadastrar</button>

            <p class="rodape-form">Já tem conta? <a href="login.html">Entrar</a></p>
        </form>
    </main>
    <site-footer></site-footer>
</body>
</html>
