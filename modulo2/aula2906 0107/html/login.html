<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/form.css">
    <title>Tela de Login</title>
</head>
<body>
    <main class="principal">
        <form id="form-login" class="formulario">
            <h1>Entrar</h1>

            <label for="email">E-mail</label>
            <input class="caixa-texto" type="email" nome="email" id="email" required>
            <br>
            <label for="senha">Senha</label>
            <input class="caixa-texto" type="password" name="senha" id="senha" required>
            <p id="aviso"></p>
            <button type="submit" class="btn">Entrar</button>
            <p class="rodape-form">Não tem conta?</p><a href="#">Cadastre-se</Cadastre-se></a>
            
        </form>
    </main>
</body>
</html>
